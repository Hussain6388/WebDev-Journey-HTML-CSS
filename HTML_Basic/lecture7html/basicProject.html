<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            height: 100%;
            width: 100%;
        }
        .container{
            height: 500px;
            width: 500px;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
           
        }
        .cards{
            background-color: orange;
            height: 150px;
            width: 150px;
            border-radius: 100px;
            

        }
        .top_container{
            padding: 30px;
            display: flex;
            justify-content: space-between;
        }
        .item{
            background-color: black;
            height: 20px;
            width: 20px;
            border-radius: 100px;
        }
        .down_container{
            background-color: rgb(123, 40, 40);
            height: 35px;
            width: 90px;
            margin-left: 30px;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="cards">
            <div class="top_container">
                <div class="item"></div>
                <div class="item"></div>
            </div>
            <div class="down_container">

            </div>
        </div>
    </div>
</body>
</html>
