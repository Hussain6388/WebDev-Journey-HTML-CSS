<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Complex Form</h1>
    <form >
        <fieldset>
        <legend>Personal Information</legend>
        <label for="name">Name </label>
        <input type="text" id="name" name="name">
        <label for="emailID">Email </label>
        <input type="email" id="emailID" name="email">
        <label for="phoneNumber">Phone </label>
        <input type="tel" id="phoneNumber" name="number">
        <label for="birthDate">Date of Birth </label>
        <input type="date" id="birthDate" name="birth">

        <span>Gender:</span>
        <input type="radio" id="gender" name="gender">
        <label for="gender">Male </label>
         <input type="radio" id="Female" name="gender">
        <label for="Female">Female </label>

        <label for="country">Country :</label>
        <select name="country" id="country">
            <option value="india">India</option>
            <option value="iran">Iran</option>
            <option value="afganistan">Afganistan</option>
            <option value="japan">Japan</option>
        </select>

    </fieldset>
    <fieldset>
        <legend>Address</legend>
        <label for="address">Street</label>
            <input type="text" id="address" name="address">
            <label for="city">City</label>
            <input type="text" id="city" name="city">
            <label for="state">State</label>
            <input type="text" id="state" name="state">
            <label for="code">Zip Code</label>
            <input type="text" id="code" name="code">

    </fieldset>

    <fieldset>
        <legend>Other Information</legend>
        <label for="comments">Comments</label>
        <textarea name="comment" id="comments"></textarea>
        
        <label for="service">I agree to the terms of service</label>
        <input type="checkbox" name="service" id="service">
    </fieldset>
    
    <input type="submit" value="Submit">
    </form>
</body>
