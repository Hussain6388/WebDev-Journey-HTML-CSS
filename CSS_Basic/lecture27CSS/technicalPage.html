<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techinical</title>
    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            height: 100vh;
            width: 100vw;
            background-image: linear-gradient(90deg, #e3ffe7 0%, #d9e7ff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            
        }

        .cards{
            height: 600px;
            width: 360px;
            background-color: white;
            border-radius: 20px;
            gap: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            
           

        }
        .image1 img{
            height: 250px;
            width: 360px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
             
        }
        .amount {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background-color: rgba(133, 133, 220, 0.413);
            display: flex;
            align-items: center;
            gap: 50px;
            border-radius: 10px;
            height: 60px;
            width: 320px;
        }
        .left{
            width: 55%;
            display: flex;
            justify-content: space-between;
            align-items: center;

        }

        .imageBox img{
            
            height: 50px;
            width: 50px;
            border-radius: 100px;
        }
       
        #paymentButton{
            box-shadow: 3px 6px 30px rgba(24, 24, 24, 0.824);
            border-radius: 10px;
            height: 60px;
            width: 320px;
            color: white;
            font-size: 1.1rem;
            background-color: rgba(5, 5, 122, 0.769);
            font-weight: bold;
        }
       .ancar a{
        color: black;
        font-size: 1.2rem;
        font-weight: bold;
        text-decoration: none;
       }
       .textBox{
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 90%;
        text-align: center;
        gap: 20px;
       
       }

    </style>

</head>
<body>

    <div class="container">

        

        <div class="cards">

            <div class="image1">
                <img src="./techinical.jpg" alt="">
            </div>

            <div class="textBox">

                <h2>
                    Order Summary
                </h2>
            
                <p>Lorem ipsum dolor sit
                    amet consectetur adipisicing elit. Nam, consectetur. Culpa est
                      nulla nostrum reiciendis. Commodi hic reiciendis laborum temporibus.
                </p>


            </div>

            <div class="amount">

               <div class="left">
                    <div class="imageBox">
                         <img src="./songImage.jpg" >
                    </div>
                   
                    <div class="textAmountBox">
                        <p>Annual Plan</p>
                        <p>$99.9/year</p>
                    </div>

                </div>

                <div class="right">
                    <a href="www.com">Change</a>
                </div>

                
            </div>

            

                <button id="paymentButton">
                    Proceed to Payment
                </button>

           

            <div class="ancar">
                <a href="#">Cancle Order</a>
            </div>

        </div>
    </div>


</body>
</html>
