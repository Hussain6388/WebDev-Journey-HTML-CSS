<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin: 0; 
            padding: 0;
        }

        .container{
            background-color: bisque;
            border: solid black 2px;
            height: 680px;
            
        }
        .box1{
            background-color: rgb(93, 93, 223);
            border: solid blue 3px;
            border-radius: 10px;
            height: 50px;
            width: 150px;
            margin: 5px;
            position: relative;
            /* animation-name: movementLeft;
            animation-duration: 8s;
            animation-iteration-count: infinite;
            animation-direction: alternate;
            animation-timing-function: linear; */
            animation: 2s movementLeft infinite alternate linear;
        }
        @keyframes movementLeft {
            from{
                top: 0;
                left: 0;
            }
            to{
                top: 0;
                left:1320px;
            }
        }

         .box2{
            background-color: rgb(93, 93, 223);
            border: solid blue 3px;
            border-radius: 10px;
            height: 50px;
            width: 150px;
            margin: 5px;
            position: relative;
            /* animation-name: movementRight;
            animation-duration: 2s;
            animation-iteration-count: infinite;
            animation-direction: alternate;
            animation-timing-function: linear; */
            animation: 2s movementRight 4s infinite alternate linear ;
        }
        @keyframes movementRight {
            from{
                top: 550px;
                left: 1320px;
            }
            to{
                top: 550px;
                left:0;
            }
        }

        .box3{
            background-color: green;
            border: red 2px solid;
            height: 100px;
            margin: 5px;
            width: 100px;
            border-radius: 100px;
            position: relative;
            /* animation-name: cirle;
            animation-duration: 4s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
            animation-direction: alternate; */
            animation:  5s infinite linear 2s    cirle;
        }
        /* @keyframes cirle {
            from{
                top :15%;
                left: 0;
            }
            to{
                top: 15%;
                left: 1320px;
            }
        } */
         @keyframes cirle {
            0%{
                top :1%;
                left: 20%;
            }
            30%{
                top :20%;
                left: 40%;
            }
            65%{
                top :40%;
                left: 20%;
            }
            100%{
                top :20%;
                left: 1%;
            }
            
        }
    </style>

</head>
<body>
    <div class="container">
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
    </div>
</body>
</html>
