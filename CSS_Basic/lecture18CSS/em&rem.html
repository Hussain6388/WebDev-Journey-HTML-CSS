<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /*  em * parent  value in html */
        .parent{
            border: 1px solid red;
            font-size: 50px;
        }
        .child{
            font-size: 5em;
            border: 1px solid black;
        }

        /*  rem*default value in html */
        .box{
            border: 1px solid black;
            font-size: 10rem;
        }

    </style>
</head>
<body>

    <p class="box">Esrail Ali is a student</p>
    <div class="parent">
        esrail
        <div class="child">
        Welcome to code help
    </div>
    </div>
    
</body>
</html>
