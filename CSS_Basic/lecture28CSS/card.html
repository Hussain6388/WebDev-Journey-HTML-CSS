<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .cards{
            height: 200px;
            width: 650px;
            gap: 0.5rem;
            background-color: rgb(94, 83, 83);
            display: grid;
            padding: 0.5rem;
            grid-template-columns: repeat(3,1fr);
            grid-template-rows: repeat(7,1fr);
        }
        .item1{
            background-color: rgb(94, 83, 83);
            grid-column-start: 1;
            grid-column-end: 4;
        }
        .top_footer{
            height: 45%;
            width: 100%;
            background-color: rgb(94, 83, 83);
            display: grid;
            gap: 0.3rem;
            grid-template-columns: repeat(50,1fr);
        }
        
        .footer_item1{
            height: 10px;
            background-color: rgb(255, 25, 0);
            border-radius: 100%;
        }
        .footer_item2{
            height: 10px;
            background-color: orange;
            border-radius: 100%;
        }
        .footer_item3{
            height: 10px;
            background-color: rgb(16, 146, 16);
            border-radius: 100%;
        }
        .footer_item4{
            background-color: white;
            grid-column-start: 4;
            grid-column-end: 51;
            border-radius: 3px;
        }

         .item2{
            background-color: rgb(119, 105, 193);
            grid-row-start: 2;
            grid-row-end: 5;
        }
         .item3{
            background-color: rgb(3, 137, 32);
            grid-row-start: 2;
            grid-row-end: 5;
        }
         .item4{
            background-color: rgb(134, 234, 181);
            grid-row-start: 2;
            grid-row-end: 5;
        }
         .item5{
            background-color: rgb(49, 236, 21);
            grid-row-start: 5;
            grid-row-end: 8;
        }
         .item6{
            background-color:rgb(8, 245, 245);
            grid-row-start: 5;
            grid-row-end: 8;
        }
        .item7{
            background-color:rgb(245, 194, 8);
            grid-row-start: 5;
            grid-row-end: 8;
        }
        

    </style>
</head>
<body>
    <div class="cards">
        <div class="item1">
            <div class="top_footer">
                <div class="footer_item1"></div>
                <div class="footer_item2"></div>
                <div class="footer_item3"></div>
                <div class="footer_item4"></div>
            </div>
        </div>
        <div class="item2"></div>
        <div class="item3"></div>
        <div class="item4"></div>
        <div class="item5"></div>
        <div class="item6"></div>
        <div class="item7"></div>
    </div>
</body>
</html>
