<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 3D Transform</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            height: 100%;
            width: 100%;
        }
        .container{
            background-color: beige;
            padding: 1rem;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        .item{
            padding: 2rem;
            height: 100px;
            width: 100px;
            color: white;
            background-color: rgb(149, 220, 42);
            border: solid black 2px;
           
        }

        #RotateX:hover{
            transform: RotateX(45deg);
            /* transform: RotateX(-45deg); */
        }

        #RotateY:hover{
            transform: RotateY(45deg);
            /* transform: RotateY(-45deg); */
        }

        #RotateZ:hover{
            transform: RotateZ(45deg);
            /* transform: RotateZ(-45deg); */
        }

        #TranslateX:hover{
            transform: TranslateX(100px);
            /* transform: translateX(-100px); */
        }

        #TranslateY:hover{
            transform: translateY(100px);
            /* transform: translateY(-100px); */
        }

        #TranslateZ:hover{
            transform:perspective(300px) translateZ(100px);   
            /* transform:perspective(-300px) translateZ(100px); perspective ka matlab hai ki ham item ko kitna door se dekh rhe hai */
        }

        #ScaleX:hover{
            
            transform: skewX(40deg);


            /* transform: scaleX(2); */
             /* transform: scaleX(-2); */
        }

        #ScaleY:hover{
            transform: scaleY(2.4);
            /* transform: scaleY(-2.4); */
        }

        #ScaleZ:hover{
            transform:perspective(300px) RotateY(45deg) scaleX(5);
            /* transform:perspective(300px) RotateY(45deg) scaleZ(-1.5); jo bhi add kiya gaya hai visibility ke liye hai*/ 
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="item"id="RotateX">Rotate X</div>
        <div class="item"id="RotateY">Rotate Y</div>
        <div class="item"id="RotateZ">Rotate Z</div>
        <div class="item"id="TranslateX">Translate X</div>
        <div class="item"id="TranslateY">Translate Y</div>
        <div class="item"id="TranslateZ">Translate Z</div>
        <div class="item"id="ScaleX">Scale X</div>
        <div class="item"id="ScaleY">Scale Y</div>
        <div class="item"id="ScaleZ">Scale Z</div>
    </div>
</body>
</html>
